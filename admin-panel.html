<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Anfragen</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .header {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 30, 0.85);
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            background: linear-gradient(135deg, #ffffff 0%, #e0e0ff 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
            font-weight: 800;
        }

        .logout-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #6200ea 0%, #8e24aa 50%, #b830d1 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(98, 0, 234, 0.5);
        }

        .stats {
            max-width: 1400px;
            margin: 0 auto 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: rgba(10, 10, 30, 0.85);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #6200ea, #b830d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 5px;
        }

        .requests-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(10, 10, 30, 0.85);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .request-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .request-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .request-name {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .request-date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .request-info {
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            margin-bottom: 8px;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.6);
            min-width: 120px;
            font-weight: 600;
        }

        .info-value {
            color: rgba(255, 255, 255, 0.9);
        }

        .request-description {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-top: 15px;
        }

        .delete-btn {
            padding: 8px 16px;
            background: rgba(255, 0, 0, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: rgba(255, 0, 0, 0.3);
        }

        .no-requests {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Admin Panel - Anfragen Verwaltung</h1>
        <button class="logout-btn" onclick="logout()">Abmelden</button>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-number" id="totalRequests">0</div>
            <div class="stat-label">Gesamt Anfragen</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="todayRequests">0</div>
            <div class="stat-label">Heute</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="thisWeekRequests">0</div>
            <div class="stat-label">Diese Woche</div>
        </div>
    </div>

    <div class="requests-container">
        <h2 style="margin-bottom: 25px; font-size: 22px;">Alle Anfragen</h2>
        <div id="requestsList"></div>
    </div>

    <script>
        // Check if user is logged in
        if (localStorage.getItem('adminLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html';
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        async function loadRequests() {
            try {
                const response = await fetch('/api/get-requests');
                const data = await response.json();

                const requests = data.requests || [];
                const requestsList = document.getElementById('requestsList');

                // Update stats
                document.getElementById('totalRequests').textContent = requests.length;

                const today = new Date().toDateString();
                const todayCount = requests.filter(r => new Date(r.timestamp).toDateString() === today).length;
                document.getElementById('todayRequests').textContent = todayCount;

                const weekAgo = new Date();
                weekAgo.setDate(weekAgo.getDate() - 7);
                const weekCount = requests.filter(r => new Date(r.timestamp) >= weekAgo).length;
                document.getElementById('thisWeekRequests').textContent = weekCount;

                if (requests.length === 0) {
                    requestsList.innerHTML = '<div class="no-requests">Noch keine Anfragen erhalten.</div>';
                    return;
                }

                // Sort by newest first
                requests.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                requestsList.innerHTML = requests.map((request) => {
                    const date = new Date(request.timestamp);
                    const formattedDate = date.toLocaleDateString('de-DE', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    return `
                        <div class="request-card">
                            <div class="request-header">
                                <div>
                                    <div class="request-name">${request.name}</div>
                                    <div class="request-date">${formattedDate}</div>
                                </div>
                                <button class="delete-btn" onclick="deleteRequest('${request.id}')">Löschen</button>
                            </div>
                            <div class="request-info">
                                <div class="info-row">
                                    <span class="info-label">E-Mail:</span>
                                    <span class="info-value"><a href="mailto:${request.email}" style="color: #6200ea;">${request.email}</a></span>
                                </div>
                                ${request.phone ? `
                                <div class="info-row">
                                    <span class="info-label">Telefon:</span>
                                    <span class="info-value"><a href="tel:${request.phone}" style="color: #6200ea;">${request.phone}</a></span>
                                </div>
                                ` : ''}
                                <div class="info-row">
                                    <span class="info-label">Projekt-Art:</span>
                                    <span class="info-value">${request.project_type || 'N/A'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Budget:</span>
                                    <span class="info-value">${request.budget || 'N/A'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Start-Termin:</span>
                                    <span class="info-value">${request.start_date || 'N/A'}</span>
                                </div>
                            </div>
                            <div class="request-description">
                                <strong>Projektbeschreibung:</strong><br>
                                ${request.description}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading requests:', error);
                document.getElementById('requestsList').innerHTML = '<div class="no-requests">Fehler beim Laden der Anfragen.</div>';
            }
        }

        async function deleteRequest(id) {
            if (confirm('Möchten Sie diese Anfrage wirklich löschen?')) {
                try {
                    const response = await fetch('/api/delete-request', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ id })
                    });

                    const result = await response.json();

                    if (result.success) {
                        loadRequests();
                    } else {
                        alert('Fehler beim Löschen der Anfrage.');
                    }
                } catch (error) {
                    console.error('Error deleting request:', error);
                    alert('Fehler beim Löschen der Anfrage.');
                }
            }
        }

        // Load requests on page load
        loadRequests();

        // Refresh every 30 seconds
        setInterval(loadRequests, 30000);
    </script>
</body>
</html>
